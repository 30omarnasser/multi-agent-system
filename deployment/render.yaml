services:
  - type: web
    name: multi-agent-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: APP_ENV
        value: production
      - key: POSTGRES_HOST
        sync: false
      - key: POSTGRES_PORT
        value: "5432"
      - key: POSTGRES_USER
        sync: false
      - key: POSTGRES_PASSWORD
        sync: false
      - key: POSTGRES_DB
        sync: false
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: OLLAMA_HOST
        value: http://localhost:11434
      - key: AGENT_MODEL
        value: llama3.1:8b
    healthCheckPath: /health
    autoDeploy: true