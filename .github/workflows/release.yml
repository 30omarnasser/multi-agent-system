name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build release image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: |
            multi-agent-system:${{ github.ref_name }}
            multi-agent-system:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            Multi-Agent AI System Release ${{ github.ref_name }}

            Features:
            - Multi-agent system (Planner, Researcher, Coder, Critic, Responder)
            - LangGraph orchestration
            - Memory + RAG + HITL
            - MLflow tracking
            - Dockerized system

            Run:
            docker compose up --build
          draft: false
          prerelease: false